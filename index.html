<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ComKrubKrong Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>កំពុងផ្ទុក...</p>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">🛍️ ComKrubKrong</h1>
                <div class="header-actions">
                    <button class="icon-btn" id="searchBtn">
                        <span>🔍</span>
                    </button>
                    <button class="icon-btn cart-btn" id="cartBtn">
                        <span>🛒</span>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </button>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div class="search-bar hidden" id="searchBar">
                <input type="text" placeholder="ស្វែងរកផលិតផល..." id="searchInput">
                <button id="clearSearch">✕</button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab active" data-tab="home">
                <span class="tab-icon">🏠</span>
                <span class="tab-label">ទំព័រដើម</span>
            </button>
            <button class="tab" data-tab="products">
                <span class="tab-icon">🛍️</span>
                <span class="tab-label">ផលិតផល</span>
            </button>
            <button class="tab" data-tab="orders">
                <span class="tab-icon">📦</span>
                <span class="tab-label">ការបញ្ជាទិញ</span>
            </button>
            <button class="tab" data-tab="profile">
                <span class="tab-icon">👤</span>
                <span class="tab-label">គណនី</span>
            </button>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <!-- Home Page -->
            <section id="home-page" class="page active">
                <div class="banner">
                    <h2>🎉 Welcome to Our Shop!</h2>
                    <p>ផលិតផលគុណភាពល្អបំផុត តម្លៃសមរម្យ</p>
                </div>

                <div class="section">
                    <h3 class="section-title">🔥 ផលិតផលពេញនិយម</h3>
                    <div class="product-grid" id="featuredProducts">
                        <!-- Products will be loaded here -->
                    </div>
                </div>

                <div class="section">
                    <h3 class="section-title">📂 ប្រភេទផលិតផល</h3>
                    <div class="category-grid" id="categories">
                        <!-- Categories will be loaded here -->
                    </div>
                </div>
            </section>

            <!-- Products Page -->
            <section id="products-page" class="page">
                <div class="filter-bar">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">ប្រភេទទាំងអស់</option>
                    </select>
                    <select id="sortFilter" class="filter-select">
                        <option value="newest">ថ្មីបំផុត</option>
                        <option value="price_low">តម្លៃ: ទាបជាងគេ</option>
                        <option value="price_high">តម្លៃ: ខ្ពស់ជាងគេ</option>
                        <option value="popular">ពេញនិយម</option>
                    </select>
                </div>

                <div class="product-grid" id="allProducts">
                    <!-- Products will be loaded here -->
                </div>
            </section>

            <!-- Orders Page -->
            <section id="orders-page" class="page">
                <div class="filter-bar">
                    <select id="orderFilter" class="filter-select">
                        <option value="all">ទាំងអស់</option>
                        <option value="pending">កំពុងរងចាំ</option>
                        <option value="confirmed">បានបញ្ជាក់</option>
                        <option value="processing">កំពុងដំណើរការ</option>
                        <option value="shipping">កំពុងដឹកជញ្ជូន</option>
                        <option value="delivered">ជោគជ័យ</option>
                    </select>
                </div>

                <div class="orders-list" id="ordersList">
                    <!-- Orders will be loaded here -->
                </div>
            </section>

            <!-- Profile Page -->
            <section id="profile-page" class="page">
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <h2 class="profile-name" id="profileName">Loading...</h2>
                    <p class="profile-username" id="profileUsername">@username</p>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalOrders">0</div>
                        <div class="stat-label">ការបញ្ជាទិញ</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="completedOrders">0</div>
                        <div class="stat-label">បានបញ្ជាទិញ</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalSpent">$0</div>
                        <div class="stat-label">ចំណាយសរុប</div>
                    </div>
                </div>

                <div class="profile-menu">
                    <button class="menu-item" id="editProfileBtn">
                        <span>✏️ កែប្រែព័ត៌មាន</span>
                        <span>›</span>
                    </button>
                    <button class="menu-item" id="settingsBtn">
                        <span>⚙️ ការកំណត់</span>
                        <span>›</span>
                    </button>
                    <button class="menu-item" id="helpBtn">
                        <span>ℹ️ ជំនួយ</span>
                        <span>›</span>
                    </button>
                </div>
            </section>
        </main>

        <!-- Shopping Cart Modal -->
        <div id="cartModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🛒 កន្ត្រកទិញ</h2>
                    <button class="close-btn" id="closeCart">✕</button>
                </div>
                <div class="modal-body">
                    <div id="cartItems" class="cart-items">
                        <!-- Cart items will be loaded here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="cart-total">
                        <span>សរុប:</span>
                        <span id="cartTotal" class="total-amount">$0.00</span>
                    </div>
                    <button class="btn btn-primary btn-block" id="checkoutBtn">
                        ✅ បញ្ជាទិញ
                    </button>
                </div>
            </div>
        </div>

        <!-- Product Detail Modal -->
        <div id="productModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="productModalTitle">Product</h2>
                    <button class="close-btn" id="closeProduct">✕</button>
                </div>
                <div class="modal-body" id="productModalBody">
                    <!-- Product details will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Order Detail Modal -->
        <div id="orderModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📦 ព័ត៌មានការបញ្ជាទិញ</h2>
                    <button class="close-btn" id="closeOrder">✕</button>
                </div>
                <div class="modal-body" id="orderModalBody">
                    <!-- Order details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/telegram.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
